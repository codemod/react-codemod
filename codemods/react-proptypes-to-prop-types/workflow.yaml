# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

params:
  schema:
    module-name:
      name: "Module Name"
      description: "Module specifier to use for PropTypes imports and requires."
      type: string
      default: "prop-types"

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: "Scan tsx files and apply fixes"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "tsx"
