# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

params:
  schema:
    mixin-name:
      name: "Mixin Name"
      description: "Identifier name for the pure render mixin to replace."
      type: string
      default: "PureRenderMixin"

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: "Scan tsx files and apply fixes"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "tsx"
